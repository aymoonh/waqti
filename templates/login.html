<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - وقتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#161313;
  --ink-soft:#6b6360;
  --card:#ffffff;
  --line:#e9e2d8;
  --paper:#f0fdf4;
  --green:#1bc84a;
  --green-dark:#15a83d;
  --green-tint:#dcfce7;
  --accent:#0ea5e9;
  --accent-dark:#0284c7;
  --accent-tint:#f0f9ff;
  --bad:#dc2626;
  --radius-lg:28px;
  --radius-md:14px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a2818,#0c3d52);
  padding:20px;
}

.box{
  width:440px;
  max-width:100%;
  background:var(--card);
  padding:42px;
  border-radius:var(--radius-lg);
  box-shadow:0 30px 70px rgba(0,0,0,.35);
}

.logo{
  text-align:center;
  margin-bottom:-20px;
}

.subtitle{
  text-align:center;
  color:var(--ink-soft);
  font-size:17px;
  font-weight:600;
  margin-bottom:28px;
}

.field-label{
  display:block;
  font-weight:700;
  font-size:14px;
  color:var(--ink);
  margin-bottom:7px;
}

input{
  width:100%;
  padding:14px 16px;
  font-size:15px;
  border-radius:var(--radius-md);
  border:1.5px solid var(--line);
  margin-bottom:16px;
  outline:none;
  font-family:'Cairo',sans-serif;
  background:#fffdfb;
  color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}

input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-tint);
}

button{
  width:100%;
  padding:15px;
  font-size:16px;
  font-weight:800;
  border:none;
  border-radius:var(--radius-md);
  background:var(--green);
  color:white;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  transition:background .15s;
}

button:hover{background:var(--green-dark);}

#msg{
  margin-top:14px;
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:var(--bad);
  min-height:18px;
}

.register{
  margin-top:22px;
  padding-top:20px;
  border-top:1px solid var(--line);
  text-align:center;
  font-size:14px;
  color:var(--ink-soft);
  font-weight:600;
}

.register a{color:var(--accent);font-weight:800;text-decoration:none;}
.register a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="box">

  <div class="logo">
    <img src="/uploads/Waqti_logo.png" alt="وقتي" style="width:180px;height:180px;object-fit:contain;border-radius:22px;display:block;margin:0 auto;">
  </div>

  <p class="subtitle">منصة الحجوزات الذكية عبر واتساب</p>

  <label class="field-label" for="username">اسم المستخدم</label>
  <input id="username" placeholder="اسم المستخدم" autocomplete="username">

  <label class="field-label" for="password">كلمة المرور</label>
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
  <p id="msg"></p>

  <div class="register">
    ليس لديك حساب؟
    <a href="/register">إنشاء حساب</a>
  </div>

</div>

<script>
async function login(){
  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;
  let msg = document.getElementById("msg");
  msg.textContent = "";

  if(!username || !password){
    msg.textContent = "يرجى إدخال اسم المستخدم وكلمة المرور";
    return;
  }

  let response = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username, password})
  });

  let data = await response.json();

  if(data.message === "Login successful"){
    window.location = "/admin";
  } else {
    msg.textContent = "اسم المستخدم أو كلمة المرور غير صحيحة";
  }
}

document.addEventListener("keydown", e => {
  if(e.key === "Enter") login();
});
</script>
</body>
</html>
