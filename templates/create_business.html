<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء نشاطك التجاري - وقتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#161313;
  --ink-soft:#6b6360;
  --card:#ffffff;
  --line:#e9e2d8;
  --green:#1bc84a;
  --green-dark:#15a83d;
  --green-tint:#dcfce7;
  --accent:#0ea5e9;
  --accent-dark:#0284c7;
  --accent-tint:#f0f9ff;
  --bad:#dc2626;
  --bad-tint:#fef2f2;
  --radius-lg:24px;
  --radius-md:14px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0a2818,#0c3d52);
  padding:20px;
}

.wrap{width:720px;max-width:100%;}

/* معاينة حية */
.preview{
  background:linear-gradient(135deg,#0a2818,#0c3d52);
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--radius-lg);
  padding:20px 24px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:14px;
  position:relative;
  overflow:hidden;
}

.preview::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(360px 180px at 90% -20%, rgba(27,200,74,.25), transparent 70%);
  pointer-events:none;
}

.preview-logo{
  width:54px;height:54px;
  border-radius:14px;
  background:#fff;
  padding:6px;
  object-fit:contain;
  flex:none;
  position:relative;
  z-index:1;
}

.preview-info{position:relative;z-index:1;min-width:0;}

.preview-name{
  color:#fff;
  font-weight:900;
  font-size:17px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.preview-slug{
  color:#a7f3d0;
  font-size:12.5px;
  font-weight:600;
  margin-top:3px;
}

.preview-label{
  position:relative;z-index:1;
  margin-right:auto;
  color:rgba(255,255,255,.5);
  font-size:11px;
  font-weight:700;
  border:1px dashed rgba(255,255,255,.2);
  padding:4px 10px;
  border-radius:999px;
  flex:none;
}

/* الكارد */
.box{
  background:var(--card);
  padding:48px 52px;
  border-radius:var(--radius-lg);
  box-shadow:0 30px 70px rgba(0,0,0,.35);
}

h1{
  text-align:center;
  font-size:23px;
  font-weight:900;
  color:var(--ink);
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:var(--ink-soft);
  font-size:14px;
  font-weight:600;
  margin-bottom:26px;
}

.field{margin-bottom:16px;}

.field-label{
  display:block;
  font-weight:700;
  font-size:14px;
  color:var(--ink);
  margin-bottom:7px;
}

input, select{
  width:100%;
  padding:14px 16px;
  font-size:15px;
  border-radius:var(--radius-md);
  border:1.5px solid var(--line);
  outline:none;
  font-family:'Cairo',sans-serif;
  background:#fffdfb;
  color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
  box-sizing:border-box;
}

input::placeholder{color:#b9b0a7;}
input:focus, select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-tint);
}

input.invalid{border-color:var(--bad);}

.field-msg{
  font-size:12px;
  font-weight:700;
  color:var(--bad);
  margin-top:5px;
  display:none;
}
.field-msg.show{display:block;}

/* slug wrap */
.slug-wrap{
  display:flex;
  align-items:stretch;
  border:1.5px solid var(--line);
  border-radius:var(--radius-md);
  overflow:hidden;
  background:#fffdfb;
  transition:border-color .15s, box-shadow .15s;
}
.slug-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-tint);
}
.slug-prefix{
  display:flex;
  align-items:center;
  padding:0 14px;
  background:var(--line);
  color:var(--ink-soft);
  font-size:13px;
  font-weight:700;
  white-space:nowrap;
}
.slug-wrap input{border:none;border-radius:0;box-shadow:none !important;}

/* فئات */
.categories{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.cat-card{
  border:2px solid var(--line);
  border-radius:var(--radius-md);
  padding:20px 10px;
  text-align:center;
  cursor:pointer;
  transition:border-color .15s, background .15s;
  background:#fffdfb;
}

.cat-icon{font-size:32px;margin-bottom:8px;}
.cat-name{font-size:14px;font-weight:700;color:var(--ink);}

/* لوجو */
.logo-row{display:flex;align-items:center;gap:12px;}

.logo-preview-sm{
  width:48px;height:48px;
  border-radius:12px;
  border:1.5px dashed var(--line);
  object-fit:contain;
  padding:4px;
  flex:none;
  background:#fff;
}

.file-btn{
  position:relative;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  border:1.5px dashed var(--line);
  border-radius:var(--radius-md);
  padding:12px 16px;
  font-size:14px;
  font-weight:600;
  color:var(--ink-soft);
  background:#fffdfb;
  cursor:pointer;
  transition:border-color .15s, color .15s;
}
.file-btn:hover{border-color:var(--green);color:var(--green-dark);}
.file-btn input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}

/* زر */
button{
  width:100%;
  margin-top:8px;
  padding:15px;
  font-size:16px;
  font-weight:800;
  border:none;
  border-radius:var(--radius-md);
  background:var(--green);
  color:white;
  cursor:pointer;
  font-family:'Cairo',sans-serif;
  transition:background .15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
button:hover{background:var(--green-dark);}
button:disabled{opacity:.7;cursor:not-allowed;}

.spinner{
  width:16px;height:16px;
  border:2.5px solid rgba(255,255,255,.4);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
button.loading .spinner{display:inline-block;}
button.loading .btn-label{display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

#msg{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  font-weight:700;
  color:var(--bad);
  min-height:18px;
}

@media(max-width:480px){
  .box{padding:26px 20px;}
  .categories{grid-template-columns:repeat(2,1fr);}
}
.cat-card.selected {
  border-color: var(--accent);
  background: var(--accent-tint);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(14,165,233,.15);
}
</style>
</head>
<body>

<div class="wrap">

  <!-- معاينة حية -->
  <div class="preview">
    <img id="previewLogo" class="preview-logo" src="https://res.cloudinary.com/dsostxiei/image/upload/v1782521187/Waqti_Logo_ljaxhc.png" alt="">
    <div class="preview-info">
      <div class="preview-name" id="previewName">اسم نشاطك</div>
      <div class="preview-slug" id="previewSlug">talabo.app/book/your-slug</div>
    </div>
    <span class="preview-label">معاينة حية</span>
  </div>

  <div class="box">

    <h1>أنشئ نشاطك التجاري</h1>
    <p class="subtitle">خطوة وحدة وتبدأ تستقبل الحجوزات</p>

    <!-- الفئة -->
    <div class="field">
      <label class="field-label">نوع النشاط</label>
      <div class="categories">
        <div class="cat-card" onclick="selectCat(this,'صالون')" data-cat="صالون">
          <div class="cat-icon">💇</div>
          <div class="cat-name">صالون</div>
        </div>
        <div class="cat-card" onclick="selectCat(this,'عيادة')" data-cat="عيادة">
          <div class="cat-icon">🏥</div>
          <div class="cat-name">عيادة</div>
        </div>
        <div class="cat-card" onclick="selectCat(this,'مطعم')" data-cat="مطعم">
          <div class="cat-icon">🍽️</div>
          <div class="cat-name">مطعم</div>
        </div>
        <div class="cat-card" onclick="selectCat(this,'لياقة')" data-cat="لياقة">
          <div class="cat-icon">🏋️</div>
          <div class="cat-name">لياقة</div>
        </div>
        <div class="cat-card" onclick="selectCat(this,'استشارات')" data-cat="استشارات">
          <div class="cat-icon">💼</div>
          <div class="cat-name">استشارات</div>
        </div>
        <div class="cat-card" onclick="selectCat(this,'أخرى')" data-cat="أخرى">
          <div class="cat-icon">✨</div>
          <div class="cat-name">أخرى</div>
        </div>
      </div>
      <div id="catMsg" class="field-msg">يرجى اختيار نوع النشاط</div>
    </div>

    <!-- الاسم -->
    <div class="field">
      <label class="field-label" for="name">اسم النشاط</label>
      <input id="name" placeholder="مثال: صالون لمسة" oninput="previewName.textContent = this.value || 'اسم نشاطك'">
    </div>

    <!-- الواتساب -->
    <div class="field">
      <label class="field-label" for="whatsapp">رقم الواتساب <span style="color:var(--ink-soft);font-weight:500;font-size:13px;">— لاستقبال الحجوزات</span></label>
      <input id="whatsapp" placeholder="‎+970 59 000 0000" inputmode="tel">
      <div id="waMsg" class="field-msg">رقم الواتساب غير صحيح</div>
    </div>

    <!-- الرابط -->
    <div class="field">
      <label class="field-label" for="slug">رابط صفحة الحجز</label>
      <div class="slug-wrap">
        <span class="slug-prefix">talabo.app/book/</span>
        <input id="slug" placeholder="salon-lamsa" oninput="onSlugInput()">
      </div>
      <div id="slugMsg" class="field-msg">حروف إنجليزية وأرقام وشرطات فقط</div>
    </div>

    <!-- الشعار -->
    <div class="field">
      <label class="field-label">شعار النشاط <span style="color:var(--ink-soft);font-weight:500;font-size:13px;">— اختياري</span></label>
      <div class="logo-row">
        <img id="logoPreviewSm" class="logo-preview-sm" src="/uploads/Waqti_logo.png" alt="">
        <div class="file-btn">
          <span>📁</span>
          <span id="fileLabel">اختر صورة الشعار</span>
          <input type="file" id="logo_file" accept="image/*" onchange="onLogoChange()">
        </div>
      </div>
    </div>

    <input type="hidden" id="logo_url" value="/uploads/Waqti_logo.png">
    <input type="hidden" id="selected_cat" value="">

    <button id="submitBtn" onclick="submitBusiness()">
      <span class="spinner"></span>
      <span class="btn-label">🚀 إنشاء النشاط</span>
    </button>

    <p id="msg"></p>

  </div>
</div>

<script>

let previewName = document.getElementById("previewName");
let previewSlug = document.getElementById("previewSlug");
let previewLogo = document.getElementById("previewLogo");

function selectCat(el, cat){
  document.querySelectorAll(".cat-card").forEach(c => c.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("selected_cat").value = cat;
  document.getElementById("catMsg").classList.remove("show");
}

function onSlugInput(){
  let input = document.getElementById("slug");
  let cleaned = input.value.toLowerCase().replace(/\s+/g,'-');
  if(cleaned !== input.value) input.value = cleaned;
  previewSlug.textContent = "talabo.app/book/" + (input.value || "your-slug");
  let msg = document.getElementById("slugMsg");
  if(input.value && !/^[a-z0-9-]+$/.test(input.value)){
    msg.classList.add("show");
  } else {
    msg.classList.remove("show");
  }
}

function onLogoChange(){
  let file = document.getElementById("logo_file").files[0];
  if(!file) return;
  let url = URL.createObjectURL(file);
  previewLogo.src = url;
  document.getElementById("logoPreviewSm").src = url;
  document.getElementById("fileLabel").textContent = "✓ " + file.name;
  document.getElementById("logo_url").value = "";
}

function setLoading(v){
  let btn = document.getElementById("submitBtn");
  btn.disabled = v;
  btn.classList.toggle("loading", v);
}

async function submitBusiness(){

  let cat      = document.getElementById("selected_cat").value;
  let name     = document.getElementById("name").value.trim();
  let whatsapp = document.getElementById("whatsapp").value.trim();
  let slug     = document.getElementById("slug").value.trim();
  let logoUrl  = document.getElementById("logo_url").value;
  let msg      = document.getElementById("msg");
  let hasError = false;

  msg.textContent = "";

  if(!cat){
    document.getElementById("catMsg").classList.add("show");
    hasError = true;
  }

  if(!name){ hasError = true; }

  let waClean = whatsapp.replace(/[^0-9]/g,'');
  if(waClean.length < 7 || waClean.length > 15){
    document.getElementById("waMsg").classList.add("show");
    hasError = true;
  }

  if(!slug || !/^[a-z0-9-]+$/.test(slug)){
    document.getElementById("slugMsg").classList.add("show");
    hasError = true;
  }

  if(hasError) return;

  setLoading(true);

  try{

    // رفع الشعار لو في ملف جديد
    let fileInput = document.getElementById("logo_file");
    if(fileInput.files.length > 0){
      let formData = new FormData();
      formData.append("file", fileInput.files[0]);
      let uploadRes = await fetch("/upload-logo", {method:"POST", body:formData});
      let uploadData = await uploadRes.json();
      logoUrl = uploadData.logo_url;
    }

    let response = await fetch("/create-business",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ name, whatsapp, slug, category: cat, logo_url: logoUrl })
    });

    let data = await response.json();

    if(response.ok){
      window.location = "/admin";
    } else {
      msg.textContent = "❌ " + data.message;
      setLoading(false);
    }

  } catch(e){
    msg.textContent = "❌ تعذر الاتصال بالخادم";
    setLoading(false);
  }
}
</script>
</body>
</html>
