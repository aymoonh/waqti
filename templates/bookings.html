<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>الحجوزات - وقتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#161313;
  --ink-soft:#6b6360;
  --paper:#f0fdf4;
  --card:#ffffff;
  --line:#e9e2d8;
  --green:#1bc84a;
  --green-dark:#15a83d;
  --green-tint:#dcfce7;
  --accent:#0ea5e9;
  --accent-dark:#0284c7;
  --accent-tint:#f0f9ff;
  --bad:#dc2626;
  --bad-tint:#fef2f2;
  --amber:#d97706;
  --amber-tint:#fffbeb;
  --whatsapp:#25D366;
  --whatsapp-dark:#1da851;
  --radius-lg:22px;
  --radius-md:14px;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Cairo',sans-serif;
  background:var(--paper);
  color:var(--ink);
  padding:32px 18px 60px;
}

.container{max-width:1100px;margin:auto;}

.header{
  background:linear-gradient(135deg,#0a2818,#0c3d52);
  padding:26px 32px;
  border-radius:var(--radius-lg);
  color:white;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;flex-wrap:wrap;gap:14px;
  position:relative;overflow:hidden;
}
.header::after{
  content:"";position:absolute;inset:0;
  background:radial-gradient(400px 200px at 90% -20%, rgba(27,200,74,.2), transparent 70%);
  pointer-events:none;
}
.header-title{font-size:24px;font-weight:900;position:relative;z-index:1;}
.header-sub{color:#a7f3d0;font-size:13px;font-weight:600;margin-top:4px;position:relative;z-index:1;}
.header-actions{display:flex;gap:10px;position:relative;z-index:1;flex-wrap:wrap;}
.btn-pill{
  padding:10px 18px;border-radius:12px;
  text-decoration:none;font-weight:700;font-size:14px;
  white-space:nowrap;transition:transform .12s;display:inline-block;
}
.btn-pill:hover{transform:translateY(-2px);}
.btn-ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#f4ece4;}
.btn-danger{background:var(--bad);color:white;}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;margin-bottom:20px;
}
.stat-card{
  background:var(--card);border:1px solid var(--line);
  padding:18px;border-radius:var(--radius-md);text-align:center;
}
.stat-number{font-size:30px;font-weight:900;}
.stat-label{color:var(--ink-soft);font-size:13px;font-weight:600;margin-top:4px;}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.filter-btn{
  padding:9px 20px;border-radius:12px;
  border:1.5px solid var(--line);background:var(--card);
  color:var(--ink-soft);font-weight:700;cursor:pointer;
  font-size:14px;font-family:'Cairo',sans-serif;
  transition:border-color .15s, color .15s, background .15s;
}
.filter-btn:hover{border-color:var(--green);}
.filter-btn.active-all{background:var(--green);color:white;border-color:var(--green);}
.filter-btn.active-confirmed{background:var(--accent);color:white;border-color:var(--accent);}
.filter-btn.active-completed{background:var(--green-dark);color:white;border-color:var(--green-dark);}
.filter-btn.active-cancelled{background:var(--bad);color:white;border-color:var(--bad);}

/* Booking cards */
.booking-card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:20px 24px;
  margin-bottom:12px;
}

.booking-top{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:12px;
}

.booking-service{font-size:18px;font-weight:800;}
.booking-meta{color:var(--ink-soft);font-size:13px;font-weight:600;margin-top:4px;}

.status-pill{
  padding:7px 16px;border-radius:999px;
  font-weight:800;font-size:13px;
}

.booking-info{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;margin-top:16px;
  background:var(--paper);border:1px solid var(--line);
  padding:14px;border-radius:var(--radius-md);
}
.info-label{color:var(--ink-soft);font-size:12px;font-weight:600;}
.info-value{font-weight:700;margin-top:3px;font-size:14px;}
.info-value a{color:var(--whatsapp);text-decoration:none;font-weight:700;}

.booking-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

.status-select{
  padding:9px 14px;border-radius:10px;
  border:1.5px solid var(--line);color:var(--ink);
  font-weight:700;cursor:pointer;font-size:14px;
  font-family:'Cairo',sans-serif;background:var(--card);outline:none;
}
.status-select:focus{box-shadow:0 0 0 3px var(--green-tint);border-color:var(--green);}

.wa-btn{
  padding:9px 18px;border-radius:10px;
  background:var(--whatsapp);color:white;
  text-decoration:none;font-weight:700;font-size:14px;
  display:inline-flex;align-items:center;gap:6px;
  transition:background .15s;
}
.wa-btn:hover{background:var(--whatsapp-dark);}

.empty-state{
  text-align:center;padding:60px 20px;
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius-lg);color:var(--ink-soft);font-size:16px;
}

@media(max-width:540px){
  body{padding:16px 12px 40px;}
  .header{padding:20px;}
  .booking-card{padding:16px;}
}
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <div class="header-title">📅 الحجوزات</div>
      <div class="header-sub">{{ business.name }}</div>
    </div>
    <div class="header-actions">
      <a href="/admin" class="btn-pill btn-ghost">← لوحة التحكم</a>
      <a href="/logout" class="btn-pill btn-danger">🚪 خروج</a>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <button class="filter-btn active-all" id="f-الكل" onclick="filterBookings('الكل')">الكل</button>
    <button class="filter-btn" id="f-مؤكد" onclick="filterBookings('مؤكد')">🔵 مؤكد</button>
    <button class="filter-btn" id="f-مكتمل" onclick="filterBookings('مكتمل')">🟢 مكتمل</button>
    <button class="filter-btn" id="f-ملغي" onclick="filterBookings('ملغي')">🔴 ملغي</button>
  </div>

  <div id="bookings-container"></div>

</div>

<script>

let allBookings = [];
let CURRENCY = "";

const STATUS_STYLES = {
  "مؤكد":  {color:"var(--accent)",     bg:"var(--accent-tint)",  cls:"active-confirmed"},
  "مكتمل": {color:"var(--green-dark)", bg:"var(--green-tint)",   cls:"active-completed"},
  "ملغي":  {color:"var(--bad)",        bg:"var(--bad-tint)",     cls:"active-cancelled"},
};

async function loadBookings(){
  let res  = await fetch("/bookings-data");
  let data = await res.json();
  CURRENCY     = data.currency || "";
  allBookings  = data.bookings || [];
  renderStats();
  renderBookings(allBookings);
}

function renderStats(){
  let total     = allBookings.length;
  let confirmed = allBookings.filter(b => b.status === "مؤكد").length;
  let completed = allBookings.filter(b => b.status === "مكتمل").length;
  let cancelled = allBookings.filter(b => b.status === "ملغي").length;

  document.getElementById("stats").innerHTML = `
    <div class="stat-card">
      <div class="stat-number" style="color:var(--green)">${total}</div>
      <div class="stat-label">إجمالي الحجوزات</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:var(--accent)">${confirmed}</div>
      <div class="stat-label">مؤكدة</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:var(--green-dark)">${completed}</div>
      <div class="stat-label">مكتملة</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" style="color:var(--bad)">${cancelled}</div>
      <div class="stat-label">ملغية</div>
    </div>
  `;
}

function filterBookings(status){
  document.querySelectorAll(".filter-btn").forEach(b =>
    b.classList.remove("active-all","active-confirmed","active-completed","active-cancelled")
  );
  let btn = document.getElementById("f-" + status);
  if(status === "الكل") btn.classList.add("active-all");
  else btn.classList.add(STATUS_STYLES[status]?.cls || "active-all");

  let filtered = status === "الكل" ? allBookings : allBookings.filter(b => b.status === status);
  renderBookings(filtered);
}

function renderBookings(bookings){
  let container = document.getElementById("bookings-container");

  if(bookings.length === 0){
    container.innerHTML = `<div class="empty-state">📭 لا يوجد حجوزات</div>`;
    return;
  }

  container.innerHTML = bookings.map(b => {
    let s = STATUS_STYLES[b.status] || STATUS_STYLES["مؤكد"];
    let waLink = "https://wa.me/" + b.customer_phone.replace(/[^0-9]/g,'');
    return `
    <div class="booking-card" style="border-right:5px solid ${s.color}">
      <div class="booking-top">
        <div>
          <div class="booking-service">✂️ ${b.service_name}</div>
          <div class="booking-meta">📅 ${b.date} &nbsp;🕐 ${b.time} &nbsp;|&nbsp; #${b.id}</div>
        </div>
        <div class="status-pill" style="background:${s.bg};color:${s.color}">${b.status}</div>
      </div>

      <div class="booking-info">
        <div>
          <div class="info-label">👤 الاسم</div>
          <div class="info-value">${b.customer_name}</div>
        </div>
        <div>
          <div class="info-label">📱 الهاتف</div>
          <div class="info-value"><a href="${waLink}" target="_blank">${b.customer_phone} 💬</a></div>
        </div>
        <div>
          <div class="info-label">🔖 رقم الحجز</div>
          <div class="info-value">${b.tracking_code}</div>
        </div>
        <div>
          <div class="info-label">🕐 وقت الحجز</div>
          <div class="info-value">${b.created_at}</div>
        </div>
      </div>

      <div class="booking-actions">
        <select class="status-select" onchange="updateStatus(${b.id}, this.value)"
          style="border-color:${s.color};color:${s.color}">
          <option ${b.status==='مؤكد' ?'selected':''}>مؤكد</option>
          <option ${b.status==='مكتمل'?'selected':''}>مكتمل</option>
          <option ${b.status==='ملغي' ?'selected':''}>ملغي</option>
        </select>
        <a href="${waLink}" target="_blank" class="wa-btn">💬 تواصل مع الزبون</a>
      </div>
    </div>`;
  }).join("");
}

async function updateStatus(bookingId, status){
  await fetch("/bookings/" + bookingId + "/status",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({status})
  });
  await loadBookings();
}

loadBookings();
</script>
</body>
</html>
